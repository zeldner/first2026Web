<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="content">
    <div class="container">
      <h1>Login</h1>

      <form>
        <label for="userInput">Username or Email</label>
        <input
          type="text"
          id="userInput"
          placeholder="e.g. zeldner@braude.ac.il"
          required
        />

        <label for="passInput">Password</label>
        <input type="password" id="passInput" placeholder="••••••••" required />

        <button type="submit" class="btn-login">Login</button>

        <a href="register.html" class="btn-register">Register New Account</a>

        <a href="#" class="link-forgot">Forgot Password?</a>
      </form>
    </div>
  </body>
</html>
